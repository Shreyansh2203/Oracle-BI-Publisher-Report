services:
  - type: web
    name: bip-api
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn bip_api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Oracle credentials — set in Render dashboard, not committed
      - key: ORACLE_USERNAME
        sync: false
      - key: ORACLE_PASSWORD
        sync: false
      - key: ORACLE_BASE_URL
        sync: false

      # GitHub auto-save — set in Render dashboard
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_REPORTS_DIR
        value: reports

      # Tunables (safe defaults)
      - key: REPORTS_FILE
        value: reports.txt
      - key: RECEIPT_REPORT_PATH
        value: ""
      - key: MAX_BATCH_SIZE
        value: "20"
      - key: REQUEST_TIMEOUT
        value: "120"
      - key: HTTP_POOL_SIZE
        value: "10"
      - key: CACHE_TTL
        value: "300"
      - key: CACHE_MAXSIZE
        value: "128"
      - key: FILE_AGE_THRESHOLD_HOURS
        value: "4.0"
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: "false"
