  services:
  - type: web
    name: bip-api
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn bip_api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Oracle credentials — set in Render dashboard, not committed
      - key: ORACLE_USERNAME
        sync: false
      - key: ORACLE_PASSWORD
        sync: false
      - key: ORACLE_BASE_URL
        sync: false

      # GitHub auto-save — set in Render dashboard
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_REPORTS_DIR
        value: reports

      # No tunables specified here. The application will use the safe defaults
      # defined centrally in src/bip_api/config.py.
